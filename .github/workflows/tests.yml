name: Tests

on:
  push:
    branches: ["main", "master", "dev"]
  pull_request:
    branches: ["main", "master", "dev"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check gas-water-meter/custom_components/ tests/

      - name: Run ruff format check
        run: ruff format --check gas-water-meter/custom_components/ tests/

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4.1.0
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend-src/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend-src

      - name: Run frontend tests
        run: npm test
        working-directory: frontend-src

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Tesseract OCR
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt

      - name: Create custom_components symlink
        run: ln -s gas-water-meter/custom_components custom_components

      - name: Run tests
        run: |
          pytest tests/ \
            --timeout=30 \
            -v \
            --cov=gas-water-meter/custom_components/gas_water_meter \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
